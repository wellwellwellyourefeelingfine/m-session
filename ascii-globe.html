<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ASCII Globe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Azeret+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        background: #0a0a0a;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
      }
      .canvas-stack {
        position: relative;
        width: 100%;
        height: 100%;
      }
      #trail {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 0;
        opacity: 0.65;
        pointer-events: none;
      }
      #bloom-wide {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 1;
        filter: blur(40px);
        opacity: 0.85;
        pointer-events: none;
      }
      #bloom-tight {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 2;
        filter: blur(12px);
        opacity: 0.7;
        pointer-events: none;
      }
      #globe-canvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: 3;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="canvas-stack">
      <canvas id="trail"></canvas>
      <canvas id="bloom-wide"></canvas>
      <canvas id="bloom-tight"></canvas>
      <canvas id="globe-canvas"></canvas>
    </div>

        function loadEarthMap(cb) {
          var img = new Image();
          img.onload = function () {
            var c = document.createElement("canvas");
            c.width = MAP_W;
            c.height = MAP_H;
            var ctx = c.getContext("2d");
            ctx.drawImage(img, 0, 0, MAP_W, MAP_H);
            landPixels = ctx.getImageData(0, 0, MAP_W, MAP_H).data;
            cb();
          };
          img.src = EARTH_IMG;
        }

        function isLandEarth(ux, uy, uz) {
          var lon = (Math.atan2(ux, uz) * 180) / Math.PI;
          var lat = (Math.asin(Math.max(-1, Math.min(1, uy))) * 180) / Math.PI;
          var px = Math.round(((lon + 180) / 360) * MAP_W);
          var py = Math.round(((90 - lat) / 180) * MAP_H);
          if (px < 0) px = 0;
          if (px >= MAP_W) px = MAP_W - 1;
          if (py < 0) py = 0;
          if (py >= MAP_H) py = MAP_H - 1;
          return landPixels[(py * MAP_W + px) * 4] > 128;
        }

        // ── Noise (shared by boundary shimmer + swirl) ──
        function hashI(x, y, z) {
          var h =
            (x * 374761393 + y * 668265263 + z * 982451653 + 1013904223) | 0;
          h = Math.imul(h ^ (h >>> 13), 1274126177);
          h = Math.imul(h ^ (h >>> 16), 790606533);
          return ((h ^ (h >>> 13)) >>> 0) / 4294967295;
        }
        function smooth(t) {
          return t * t * t * (t * (t * 6 - 15) + 10);
        }
        function noise3D(x, y, z, freq) {
          var fx = x * freq,
            fy = y * freq,
            fz = z * freq;
          var ix = Math.floor(fx),
            iy = Math.floor(fy),
            iz = Math.floor(fz);
          var tx = smooth(fx - ix),
            ty = smooth(fy - iy),
            tz = smooth(fz - iz);
          var v000 = hashI(ix, iy, iz),
            v100 = hashI(ix + 1, iy, iz);
          var v010 = hashI(ix, iy + 1, iz),
            v110 = hashI(ix + 1, iy + 1, iz);
          var v001 = hashI(ix, iy, iz + 1),
            v101 = hashI(ix + 1, iy, iz + 1);
          var v011 = hashI(ix, iy + 1, iz + 1),
            v111 = hashI(ix + 1, iy + 1, iz + 1);
          var x00 = v000 + (v100 - v000) * tx,
            x10 = v010 + (v110 - v010) * tx;
          var x01 = v001 + (v101 - v001) * tx,
            x11 = v011 + (v111 - v011) * tx;
          var y0 = x00 + (x10 - x00) * ty,
            y1 = x01 + (x11 - x01) * ty;
          return y0 + (y1 - y0) * tz;
        }
        function boundaryNoise3D(ux, uy, uz, t) {
          var tt = t * 0.2;
          return (
            noise3D(ux * 2 + 5 + tt, uy * 2 + 5, uz * 2 + 5 + tt, 3.0) * 0.22 +
            noise3D(ux * 2 + 5, uy * 2 + 5 + tt, uz * 2 + 5, 7.0) * 0.12 +
            noise3D(
              ux * 2 + 5 + tt * 0.5,
              uy * 2 + 5 + tt * 0.7,
              uz * 2 + 5,
              15.0
            ) *
              0.06
          );
        }

        // ── Atlas texture ──
        function createAtlas() {
          var c = document.createElement("canvas");
          c.width = c.height = ATLAS_PX;
          var ctx = c.getContext("2d");
          ctx.font = "500 80px Azeret Mono";
          ctx.fillStyle = "#ffffff";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          for (var i = 0; i < ALL_CHARS.length; i++) {
            var col = i % ATLAS_COLS,
              row = Math.floor(i / ATLAS_COLS);
            ctx.fillText(
              ALL_CHARS[i],
              col * CELL_PX + CELL_PX / 2,
              row * CELL_PX + CELL_PX / 2
            );
          }
          var tex = new THREE.CanvasTexture(c);
          tex.minFilter = THREE.LinearFilter;
          tex.magFilter = THREE.LinearFilter;
          return tex;
        }

        // ── Grid points ──
        function generatePoints() {
          var pts = [],
            latStep = SPACING / SPHERE_RADIUS;
          var polarMin = ((90 - POLAR_CUTOFF_DEG) * Math.PI) / 180;
          var polarMax = ((90 + POLAR_CUTOFF_DEG) * Math.PI) / 180;
          for (var phi = polarMin; phi <= polarMax; phi += latStep) {
            var sinP = Math.sin(phi),
              cosP = Math.cos(phi);
            var nCols = Math.max(
              6,
              Math.round((2 * Math.PI * SPHERE_RADIUS * sinP) / SPACING)
            );
            var thetaStep = (2 * Math.PI) / nCols;
            for (var j = 0; j < nCols; j++) {
              var theta = j * thetaStep;
              var ux = sinP * Math.cos(theta),
                uy = cosP,
                uz = sinP * Math.sin(theta);
              var land = isLandEarth(ux, uy, uz);
              pts.push({
                ux: ux,
                uy: uy,
                uz: uz,
                isLand: land,
                zone: land ? "land" : "ocean",
                atlasIdx: 0,
                displaced: false,
                jitter: (Math.random() - 0.5) * 0.14,
                nextShuffle: Math.random() * SHUFFLE_BASE_MS,
              });
            }
          }
          return pts;
        }

        // ── Shaders ──
        var VS =
          "attribute float atlasIdx;attribute vec3 tint;varying vec2 vUV;varying vec3 vTint;varying float vFacing;void main(){float c=mod(atlasIdx,4.0);float r=floor(atlasIdx/4.0);vUV=vec2((c+uv.x)/4.0,(3.0-r+uv.y)/4.0);vTint=tint;vec4 wPos=modelMatrix*instanceMatrix*vec4(position,1.0);mat3 nM=mat3(modelMatrix*instanceMatrix);vec3 fN=normalize(nM*vec3(0.0,0.0,1.0));vec3 vD=normalize(cameraPosition-wPos.xyz);vFacing=dot(fN,vD);gl_Position=projectionMatrix*viewMatrix*wPos;}";
        var FS =
          "uniform sampler2D atlas;varying vec2 vUV;varying vec3 vTint;varying float vFacing;void main(){vec4 t=texture2D(atlas,vUV);if(t.a<0.3) discard;float bright;float rim=0.0;if(vFacing>0.0){bright=0.55+0.45*smoothstep(0.0,0.5,vFacing);rim=pow(1.0-smoothstep(0.0,0.5,vFacing),1.3)*1.6;}else{bright=0.20;}gl_FragColor=vec4(vTint*bright+vec3(rim),t.a);}";

        // ── Helpers ──
        function pickIdx(z) {
          if (z === "mdma")
            return MDMA_IDX[(Math.random() * MDMA_IDX.length) | 0];
          if (z === "land")
            return LAND_IDX[(Math.random() * LAND_IDX.length) | 0];
          return OCEAN_IDX[(Math.random() * OCEAN_IDX.length) | 0];
        }
        function setTint(arr, i, z) {
          var t =
            z === "mdma" ? TINT_MDMA : z === "land" ? TINT_LAND : TINT_OCEAN;
          arr[i * 3] = t[0];
          arr[i * 3 + 1] = t[1];
          arr[i * 3 + 2] = t[2];
        }

        // ── Scene ──
        var canvas = document.getElementById("globe-canvas");
        var renderer = new THREE.WebGLRenderer({
          canvas: canvas,
          antialias: true,
          alpha: true,
          preserveDrawingBuffer: true,
        });
        var dpr = Math.min(window.devicePixelRatio, 2);
        renderer.setPixelRatio(dpr);
        renderer.setSize(window.innerWidth, window.innerHeight);

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(
          45,
          window.innerWidth / window.innerHeight,
          0.1,
          100
        );
        camera.position.set(0, 0, window.innerWidth > 768 ? 12 : 15);
        camera.lookAt(0, 0, 0);

        var globeGroup = new THREE.Group();
        globeGroup.rotation.z = GLOBE_TILT;
        scene.add(globeGroup);

        // ── Build globe ──
        var points = null,
          globe = null,
          waveDummy = new THREE.Object3D();

        function buildGlobe(atlasTex) {
          points = generatePoints();
          var N = points.length;
          var geo = new THREE.PlaneGeometry(CHAR_SIZE, CHAR_SIZE);
          var mat = new THREE.ShaderMaterial({
            uniforms: { atlas: { value: atlasTex } },
            vertexShader: VS,
            fragmentShader: FS,
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          var mesh = new THREE.InstancedMesh(geo, mat, N);
          mesh.instanceMatrix.setUsage(THREE.DynamicDrawUsage);

          var atlasArr = new Float32Array(N),
            tintArr = new Float32Array(N * 3);
          var atlasAttr = new THREE.InstancedBufferAttribute(atlasArr, 1);
          atlasAttr.setUsage(THREE.DynamicDrawUsage);
          geo.setAttribute("atlasIdx", atlasAttr);
          var tintAttr = new THREE.InstancedBufferAttribute(tintArr, 3);
          tintAttr.setUsage(THREE.DynamicDrawUsage);
          geo.setAttribute("tint", tintAttr);

          var dummy = new THREE.Object3D();
          for (var i = 0; i < N; i++) {
            var p = points[i];
            dummy.position.set(
              p.ux * SPHERE_RADIUS,
              p.uy * SPHERE_RADIUS,
              p.uz * SPHERE_RADIUS
            );
            dummy.lookAt(
              p.ux * SPHERE_RADIUS * 2,
              p.uy * SPHERE_RADIUS * 2,
              p.uz * SPHERE_RADIUS * 2
            );
            dummy.updateMatrix();
            mesh.setMatrixAt(i, dummy.matrix);
            var idx = pickIdx(p.zone);
            p.atlasIdx = idx;
            atlasArr[i] = idx;
            setTint(tintArr, i, p.zone);
          }
          mesh.instanceMatrix.needsUpdate = true;
          atlasAttr.needsUpdate = true;
          tintAttr.needsUpdate = true;
          globeGroup.add(mesh);
          return {
            mesh: mesh,
            atlasArr: atlasArr,
            atlasAttr: atlasAttr,
            tintArr: tintArr,
            tintAttr: tintAttr,
          };
        }

        // ── Post-processing canvases (trail + 2 bloom layers) ──
        var trailEl = document.getElementById("trail");
        var bWideEl = document.getElementById("bloom-wide");
        var bTightEl = document.getElementById("bloom-tight");
        var trailCtx = trailEl.getContext("2d");
        var bWideCtx = bWideEl.getContext("2d");
        var bTightCtx = bTightEl.getContext("2d");

        function sizePostFX() {
          var w = window.innerWidth,
            h = window.innerHeight;
          trailEl.width = Math.round(w * dpr * 0.5);
          trailEl.height = Math.round(h * dpr * 0.5);
          bWideEl.width = Math.round(w * dpr * 0.3);
          bWideEl.height = Math.round(h * dpr * 0.3);
          bTightEl.width = Math.round(w * dpr * 0.5);
          bTightEl.height = Math.round(h * dpr * 0.5);
        }
        sizePostFX();

        // ── Mouse parallax ──
        var mouseT = { x: 0, y: 0 },
          mouseC = { x: 0, y: 0 };
        window.addEventListener("mousemove", function (e) {
          mouseT.x = (e.clientX / window.innerWidth - 0.5) * 2;
          mouseT.y = (e.clientY / window.innerHeight - 0.5) * 2;
        });

        // ── Click seeds ──
        var seeds = [],
          lastClick = null;
        var raycaster = new THREE.Raycaster();
        var hitSphere = new THREE.Mesh(
          new THREE.SphereGeometry(SPHERE_RADIUS, 16, 16),
          new THREE.MeshBasicMaterial({ visible: false })
        );
        globeGroup.add(hitSphere);

        canvas.addEventListener("click", function (e) {
          if (!globe) return;
          var rect = canvas.getBoundingClientRect();
          var mouse = new THREE.Vector2(
            ((e.clientX - rect.left) / rect.width) * 2 - 1,
            -((e.clientY - rect.top) / rect.height) * 2 + 1
          );
          raycaster.setFromCamera(mouse, camera);
          var hits = raycaster.intersectObject(hitSphere);
          if (hits.length > 0) {
            var local = globeGroup.worldToLocal(hits[0].point.clone());
            var len = local.length();
            var ux = local.x / len,
              uy = local.y / len,
              uz = local.z / len;
            if (
              !lastClick ||
              ux * lastClick.x + uy * lastClick.y + uz * lastClick.z < 0.995
            ) {
              seeds.push({
                ux: ux,
                uy: uy,
                uz: uz,
                radius: 0.02,
                liveRadius: 0.02,
                born: 0,
              });
              lastClick = { x: ux, y: uy, z: uz };
            }
          }
        });

        // ── Animation loop ──
        var prevT = 0;

        function animate(time) {
          requestAnimationFrame(animate);
          var t = time * 0.001,
            dt = prevT ? t - prevT : 0.016;
          prevT = t;
          if (!globe || !points) return;

          // Globe rotation + parallax
          globeGroup.rotation.y += GLOBE_ROT_SPEED * dt;
          mouseC.x += (mouseT.x - mouseC.x) * 0.03;
          mouseC.y += (mouseT.y - mouseC.y) * 0.03;
          globeGroup.rotation.x = mouseC.y * 0.07;
          globeGroup.rotation.z = GLOBE_TILT + mouseC.x * 0.035;

          // Main blob position
          var mdmaLon = t * MDMA_ORBIT_SPEED;
          var mdmaLat = Math.sin(t * MDMA_WOBBLE_SPEED) * MDMA_WOBBLE_AMP;
          var cL = Math.cos(mdmaLat),
            sL = Math.sin(mdmaLat);
          var mCX = cL * Math.sin(mdmaLon),
            mCY = sL,
            mCZ = cL * Math.cos(mdmaLon);

          // ── Update seeds ──
          var seedCount = seeds.length;
          for (var s = seedCount - 1; s >= 0; s--) {
            var seed = seeds[s];
            if (!seed.born) seed.born = t;
            var age = t - seed.born;

            // Growth
            var baseR =
              SEED_MAX_RADIUS * Math.pow(Math.min(age / 35.0, 1.0), 0.6);

            // Absorption by main blob
            var sd = seed.ux * mCX + seed.uy * mCY + seed.uz * mCZ;
            var seedAng = Math.acos(sd > 1 ? 1 : sd < -1 ? -1 : sd);
            var overlap = MDMA_ANGULAR_RADIUS - seedAng + baseR;
            if (overlap > 0 && baseR > 0.02) {
              baseR *= 1.0 - Math.min(overlap / (baseR * 2), 1.0);
            }
            seed.radius = baseR;

            // Pulse (scales with maturity and size)
            var pulse =
              Math.sin(t * 2.5 + seed.born * 10) *
              0.04 *
              Math.min(1, age * 2) *
              Math.min(baseR / 0.2, 1);
            seed.liveRadius = Math.max(baseR + pulse, 0.001);

            // Remove if absorbed or fully covered
            if (
              (baseR < 0.005 && age > 1.0) ||
              seedAng + seed.liveRadius < MDMA_ANGULAR_RADIUS * 0.8
            ) {
              seeds.splice(s, 1);
            }
          }

          // ── Per-point update ──
          var aArr = globe.atlasArr,
            tArr = globe.tintArr;
          var dirty = false,
            matDirty = false,
            matResets = 0,
            matSwirls = 0;
          var N = points.length;
          seedCount = seeds.length; // refresh after removals

          for (var i = 0; i < N; i++) {
            var p = points[i];

            // Main blob check — skip expensive noise if clearly out of range
            var dot = p.ux * mCX + p.uy * mCY + p.uz * mCZ;
            var ang = Math.acos(dot > 1 ? 1 : dot < -1 ? -1 : dot);
            var inMainBlob = false,
              bN = 0;
            if (ang < MDMA_ANGULAR_RADIUS + 0.5) {
              bN = boundaryNoise3D(p.ux, p.uy, p.uz, t) + p.jitter;
              inMainBlob = ang < MDMA_ANGULAR_RADIUS + bN;
            }
            var inM = inMainBlob;

            // Seed check (only if not already in main blob and seeds exist)
            if (!inM && seedCount > 0) {
              var bNscaled = bN; // reuse cached boundary noise
              for (var s = 0; s < seedCount; s++) {
                var seed = seeds[s];
                var sdot = p.ux * seed.ux + p.uy * seed.uy + p.uz * seed.uz;
                var sang = Math.acos(sdot > 1 ? 1 : sdot < -1 ? -1 : sdot);
                if (
                  sang <
                  seed.liveRadius +
                    p.jitter * 0.3 +
                    bNscaled * Math.min(seed.radius * 2, 0.5)
                ) {
                  inM = true;
                  break;
                }
              }
            }

            // Zone update
            var nz = inM ? "mdma" : p.isLand ? "land" : "ocean";
            if (nz !== p.zone) {
              p.zone = nz;
              p.atlasIdx = pickIdx(nz);
              aArr[i] = p.atlasIdx;
              setTint(tArr, i, nz);
              dirty = true;
            } else if (time > p.nextShuffle) {
              p.atlasIdx = pickIdx(p.zone);
              aArr[i] = p.atlasIdx;
              p.nextShuffle =
                time + SHUFFLE_BASE_MS + Math.random() * SHUFFLE_RANGE_MS;
              dirty = true;
            }

            // Swirl displacement (main blob only, capped per frame)
            if (inMainBlob && matSwirls < 500) {
              matSwirls++;
              var edgeFade = 1.0 - ang / (MDMA_ANGULAR_RADIUS + bN);
              edgeFade *= edgeFade;
              var nt = t * 0.4;
              var n1 =
                (noise3D(p.ux * 3 + nt, p.uy * 3, p.uz * 3 + nt * 0.7, 1.0) -
                  0.5) *
                2.0;
              var n2 =
                (noise3D(
                  p.ux * 3 + 50,
                  p.uy * 3 + nt * 0.8,
                  p.uz * 3 + 50 + nt,
                  1.0
                ) -
                  0.5) *
                2.0;
              var amp = 0.03 * edgeFade;
              // Tangent axes
              var t1x = p.uz,
                t1z = -p.ux;
              var t1L = Math.sqrt(t1x * t1x + t1z * t1z);
              if (t1L > 0.001) {
                t1x /= t1L;
                t1z /= t1L;
              }
              var t2x = p.uy * t1z,
                t2y = p.uz * t1x - p.ux * t1z,
                t2z = -p.uy * t1x;
              var t2L = Math.sqrt(t2x * t2x + t2y * t2y + t2z * t2z);
              if (t2L > 0.001) {
                t2x /= t2L;
                t2y /= t2L;
                t2z /= t2L;
              }
              var dx = (t1x * n1 + t2x * n2) * amp,
                dy = t2y * n2 * amp,
                dz = (t1z * n1 + t2z * n2) * amp;
              var wx = p.ux + dx,
                wy = p.uy + dy,
                wz = p.uz + dz;
              var wL = Math.sqrt(wx * wx + wy * wy + wz * wz);
              wx /= wL;
              wy /= wL;
              wz /= wL;
              waveDummy.position.set(
                wx * SPHERE_RADIUS,
                wy * SPHERE_RADIUS,
                wz * SPHERE_RADIUS
              );
              waveDummy.lookAt(
                wx * SPHERE_RADIUS * 2,
                wy * SPHERE_RADIUS * 2,
                wz * SPHERE_RADIUS * 2
              );
              waveDummy.updateMatrix();
              globe.mesh.setMatrixAt(i, waveDummy.matrix);
              p.displaced = true;
              matDirty = true;
            } else if (p.displaced && matResets < 40) {
              waveDummy.position.set(
                p.ux * SPHERE_RADIUS,
                p.uy * SPHERE_RADIUS,
                p.uz * SPHERE_RADIUS
              );
              waveDummy.lookAt(
                p.ux * SPHERE_RADIUS * 2,
                p.uy * SPHERE_RADIUS * 2,
                p.uz * SPHERE_RADIUS * 2
              );
              waveDummy.updateMatrix();
              globe.mesh.setMatrixAt(i, waveDummy.matrix);
              p.displaced = false;
              matDirty = true;
              matResets++;
            }
          }

          if (dirty) {
            globe.atlasAttr.needsUpdate = true;
            globe.tintAttr.needsUpdate = true;
          }
          if (matDirty) {
            globe.mesh.instanceMatrix.needsUpdate = true;
          }

          // Render + post-fx
          renderer.render(scene, camera);
          trailCtx.fillStyle = "rgba(10,10,10,0.06)";
          trailCtx.fillRect(0, 0, trailEl.width, trailEl.height);
          trailCtx.drawImage(canvas, 0, 0, trailEl.width, trailEl.height);
          bWideCtx.clearRect(0, 0, bWideEl.width, bWideEl.height);
          bWideCtx.drawImage(canvas, 0, 0, bWideEl.width, bWideEl.height);
          bTightCtx.clearRect(0, 0, bTightEl.width, bTightEl.height);
          bTightCtx.drawImage(canvas, 0, 0, bTightEl.width, bTightEl.height);
        }

        // ── Resize ──
        window.addEventListener("resize", function () {
          camera.aspect = window.innerWidth / window.innerHeight;
          camera.position.z = window.innerWidth > 768 ? 12 : 15;
          camera.updateProjectionMatrix();
          renderer.setSize(window.innerWidth, window.innerHeight);
          sizePostFX();
        });

        // ── Init ──
        document.fonts.ready.then(function () {
          loadEarthMap(function () {
            globe = buildGlobe(createAtlas());
            console.log("ASCII Globe: " + points.length + " instances");
            requestAnimationFrame(animate);
          });
        });
      })();
    </script>
  </body>
</html>
